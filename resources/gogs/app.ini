BRAND_NAME = Gogs
RUN_USER = git
RUN_MODE = prod

[database]
TYPE = sqlite3
PATH = /data/gogs.db

[repository]
ROOT = /data/repositories
DEFAULT_BRANCH = master

[server]
DOMAIN = gogs
HTTP_PORT = 3000
EXTERNAL_URL = http://gogs:3000/
DISABLE_SSH = true

[security]
INSTALL_LOCK = true
SECRET_KEY = aRandomString 
LOCAL_NETWORK_ALLOWLIST = *

[webhook]
DELIVER_TIMEOUT = 10
SKIP_TLS_VERIFY = true

[log]
MODE = file
LEVEL = Info
ROOT_PATH = /data/gogs/log
